services:
  - type: web
    name: claude-slack-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python slack_bot.py
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
